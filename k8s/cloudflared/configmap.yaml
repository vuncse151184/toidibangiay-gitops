apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: toidibangiay-prod
  labels:
    app: cloudflared-tunnel
data:
  # Named tunnel config. Stable hostname survives pod restarts (unlike a quick
  # `--url` tunnel, which gets a random *.trycloudflare.com name each restart).
  config.yaml: |
    tunnel: 8cb9ed7e-8d9e-4db6-94e0-6002f4e42c1f
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      - hostname: api.toidibangiay.shop
        service: http://gateway.toidibangiay-prod.svc.cluster.local:4000
      # Catch-all required by cloudflared — must be last.
      - service: http_status:404

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: toidibangiay-prod
  labels:
    app: cart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cart-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: cart-service
          image: PLACEHOLDER_IMAGE
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: cart-service-config
            - secretRef:
                name: cart-service-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      terminationGracePeriodSeconds: 30